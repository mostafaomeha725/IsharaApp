name: isharaapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  camera: ^0.11.3
  chucker_flutter: 1.8.5
  dartz: ^0.10.1
  dio: ^5.9.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.1
  flutter_svg: ^2.0.10+1
  flutter_vision: ^2.0.0
  go_router: ^14.2.0
  pin_code_fields: ^8.0.1
  sentry_flutter: ^8.2.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0 # قواعد لتحسين جودة كتابة الكود
  flutter_test:
    sdk: flutter # لكتابة وتشغيل اختبارات للتطبيق

flutter:
  uses-material-design: true

  assets:
    - assets/ # مجلد الصور والملفات الثابتة داخل التطبيق
    - assets/letters/ # صور الحروف A-Z
    - assets/model/best_float16.tflite # موديل YOLO للتعرف على الإشارات
    - assets/model/labels.txt # ملف أسماء الفئات المُعترف عليها من الموديل
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_light.png"