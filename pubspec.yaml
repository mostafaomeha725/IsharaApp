name: isharaapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter  # الأساس — مكتبة فلاتر الرئيسية لتشغيل التطبيق

  cached_network_image: ^3.4.1  # تحميل الصور من الإنترنت مع تخزينها Cache لتحسين الأداء
  chucker_flutter: 1.8.5  # مراقبة طلبات الـ API أثناء التطوير لمعرفة الأخطاء والاستجابات
  
  flutter_bloc: ^8.1.4  # إدارة الحالات (State Management) باستخدام Cubit/BLoC
  flutter_screenutil: ^5.9.3  # يساعد التطبيق يكون Responsive مع كل أحجام الشاشات
  flutter_spinkit: ^5.2.1  # مؤثرات Loading جاهزة وجميلة
  flutter_svg: ^2.0.10+1  # دعم عرض ملفات SVG للجرافيك الواضح
  go_router: ^14.2.0  # إدارة التنقل Navigation بين الشاشات بشكل احترافي
  http: ^1.2.2  # تنفيذ طلبات API (GET/POST/...)
  sentry_flutter: ^8.2.0  # تتبع الأخطاء والمشاكل في التطبيق (Crash Reporting)
  shared_preferences: ^2.5.3  # تخزين بيانات بسيطة محليا مثل: Token / Language
  pin_code_fields: ^8.0.1  # إدخال رمز التحقق OTP بشكل احترافي
  youtube_player_flutter: ^9.1.3  # تشغيل فيديوهات YouTube داخل التطبيق
  url_launcher: ^6.3.2  # فتح روابط ومكالمات وإيميلات خارج التطبيق
  camera: ^0.11.3  # الوصول للكاميرا وتشغيلها والتقاط الصور
  flutter_vision: ^2.0.0  # تشغيل موديلات الـ AI مثل YOLO للكشف عن الأشياء


dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0  # قواعد لتحسين جودة كتابة الكود
  flutter_test:
    sdk: flutter  # لكتابة وتشغيل اختبارات للتطبيق

flutter:
  uses-material-design: true

  assets:
    - assets/  # مجلد الصور والملفات الثابتة داخل التطبيق
    - assets/model/best_float16.tflite  # موديل YOLO للتعرف على الإشارات
    - assets/model/labels.txt  # ملف أسماء الفئات المُعترف عليها من الموديل
